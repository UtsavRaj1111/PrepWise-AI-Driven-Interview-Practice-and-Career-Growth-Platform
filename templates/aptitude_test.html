<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Simulation | PrepWise</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .test-hud {
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 2.5rem;
            margin-top: 4rem;
        }

        .question-box {
            padding: 4rem;
            min-height: 300px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            position: relative;
        }

        .question-box::after {
            content: 'SIMULATION_DATA';
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            font-size: 0.6rem;
            font-weight: 900;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            opacity: 0.4;
        }

        .option-card {
            padding: 1.5rem 2rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 1rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .option-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-cyan);
        }

        .option-card.selected {
            background: rgba(0, 212, 255, 0.08);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .category-badge {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-cyan);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .progress-rail {
            height: 4px;
            background: var(--border-glass);
            border-radius: 2px;
            margin-top: 1rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
            transition: width 0.5s ease;
        }
    </style>
</head>

<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div class="logo"><a href="/" style="text-decoration:none; color:inherit;">Prep <span>Wise</span></a>
            </div>
            <nav class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/interview_start">Simulator</a>
                <a href="/resume">Resume Scan</a>
                <a href="/aptitude" class="active">Skill Paths</a>
                <a href="/mentor">Network</a>
            </nav>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <a href="/dashboard" class="btn-ghost" style="padding: 0.6rem 1.4rem; font-size: 0.85rem;">Dashboard</a>
                <a href="/interview_start" class="btn-cyan">Initialize Simulation</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 10rem;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;"
            class="animate-up">
            <div>
                <span class="category-badge" style="margin-bottom: 1rem; display: inline-block;">{{ category }}
                    Analysis</span>
                <h2 style="font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px;">Cognitive <br><span>Simulation
                        Logic.</span></h2>
            </div>
            <div style="text-align: right; width: 250px;">
                <div
                    style="display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">
                    <span>Matrix Progress</span>
                    <span id="progress-text">Q1 / 10</span>
                </div>
                <div class="progress-rail">
                    <div id="progress-bar" class="progress-fill" style="width: 10%"></div>
                </div>
            </div>
        </div>

        <div id="test-hud" class="test-hud animate-up">
            <div class="main-stage">
                <div class="question-box" id="question-text">
                    Calibrating Quantum Signal...
                </div>

                <div style="margin-top: 3rem;">
                    <h4
                        style="margin-bottom: 1.5rem; font-weight: 800; color: var(--text-muted); font-size: 0.8rem; letter-spacing: 1.5px;">
                        SELECT OUTPUT VECTOR</h4>
                    <div id="options-grid" style="display: grid; gap: 1rem;">
                        <!-- Options injected via JS -->
                    </div>

                    <div style="text-align: right; margin-top: 3rem;">
                        <button type="button" id="submit-btn" class="btn-cyan"
                            style="padding: 1.2rem 5rem; font-size: 1.1rem; opacity: 0.5; pointer-events: none;"
                            onclick="submitAptitude()">
                            Commit Signal <i class="fa-solid fa-arrow-right" style="margin-left: 0.8rem;"></i>
                        </button>
                    </div>
                </div>
            </div>

            <aside>
                <div class="glass-panel" style="padding: 2.5rem; border-color: rgba(255,255,255,0.05);">
                    <h4
                        style="margin-bottom: 1.5rem; font-weight: 800; letter-spacing: 1.5px; font-size: 0.7rem; color: var(--text-muted);">
                        COGNITIVE INTEL</h4>
                    <div id="feedback-panel">
                        <p style="font-size: 0.85rem; line-height: 1.7; color: var(--text-muted);">Waiting for signal
                            commitment...</p>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script>
        const questionText = document.getElementById('question-text');
        const optionsGrid = document.getElementById('options-grid');
        const submitBtn = document.getElementById('submit-btn');
        const feedbackPanel = document.getElementById('feedback-panel');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');

        let selectedAnswer = null;

        async function fetchAptitude() {
            try {
                const res = await fetch('/api/next_aptitude');
                const data = await res.json();

                if (data.error) {
                    questionText.innerText = `Error: ${data.error}`;
                    return;
                }
                if (data.complete) {
                    window.location.href = '/results';
                    return;
                }

                questionText.innerHTML = `<div style="font-size: 1.4rem; font-weight: 600;">${data.question}</div>`;
                progressText.innerText = `Q${data.count} / 10`;
                progressBar.style.width = `${(data.count / 10) * 100}%`;

                // Render Options
                optionsGrid.innerHTML = '';
                const letters = ['A', 'B', 'C', 'D'];
                data.options.forEach((opt, i) => {
                    const letter = letters[i];
                    const label = document.createElement('label');
                    label.className = 'option-card';
                    label.dataset.letter = letter;
                    label.onclick = () => selectOption(label, letter);
                    label.innerHTML = `
                        <div style="width: 28px; height: 28px; border: 2px solid var(--border-glass); border-radius: 50%; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:900; flex-shrink:0;">${letter}</div>
                        <span>${opt}</span>
                    `;
                    optionsGrid.appendChild(label);
                });

                submitBtn.style.opacity = '0.5';
                submitBtn.style.pointerEvents = 'none';
                selectedAnswer = null;

            } catch (err) {
                questionText.innerText = `Connection Error: ${err.message}. Please refresh the page.`;
                console.error('Fetch aptitude error:', err);
            }
        }

        function selectOption(card, val) {
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedAnswer = val;
            submitBtn.style.opacity = '1';
            submitBtn.style.pointerEvents = 'auto';
        }

        async function submitAptitude() {
            if (!selectedAnswer) return;

            submitBtn.disabled = true;
            try {
                const res = await fetch('/api/check_aptitude', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ answer: selectedAnswer })
                });
                const data = await res.json();

                feedbackPanel.innerHTML = `
                    <div style="font-size: 0.9rem; color: ${data.is_correct ? '#10b981' : '#f43f5e'}; font-weight: 900; margin-bottom: 1rem;">
                        ${data.is_correct ? '✓ SIGNAL ACCURATE' : '✗ SIGNAL DRIFT DETECTED'}
                    </div>
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.8rem;">Correct: <strong style="color: var(--accent-cyan);">${data.correct_answer}</strong></div>
                    <p style="font-size: 0.85rem; line-height: 1.6; color: var(--text-muted);">${data.explanation || ''}</p>
                `;

                setTimeout(fetchAptitude, 4000); // 4s to read explanation
            } catch (err) {
                console.error("Evaluation failure", err);
            } finally {
                submitBtn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', fetchAptitude);
    </script>
</body>

</html>
