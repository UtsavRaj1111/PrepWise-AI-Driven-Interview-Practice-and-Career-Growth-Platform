<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initialize Protocol | PrepWise</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(0, 212, 255, 0.05) 0%, transparent 70%);
        }

        .auth-card {
            width: 450px;
            padding: 3.5rem;
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .auth-header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .input-group input {
            width: 100%;
            padding: 1.2rem 1.4rem 1.2rem 3.2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }

        .input-group input:focus+i {
            color: var(--accent-cyan);
        }

        .btn-auth {
            width: 100%;
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            margin-top: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--accent-cyan);
            color: #05070a;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
            filter: brightness(1.1);
        }

        .auth-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 700;
            margin-left: 0.5rem;
        }

        /* Flash Message Toast */
        .flash-msg {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .flash-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .flash-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper animate-up">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/" style="text-decoration:none; display:inline-block; margin-bottom:1.5rem;">
                    <div class="logo">Prep<span>Wise</span></div>
                </a>
                <h1>Initialize Protocol.</h1>
                <p>Register your unique signal in the PrepWise matrix.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash-msg flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="/signup" method="POST">
                <div class="input-group">
                    <input type="email" name="email" placeholder="Signal Origin (Email)" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Access Cipher (Password)" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="input-group">
                    <input type="password" name="confirm_password" placeholder="Verify Cipher" required>
                    <i class="fa-solid fa-shield-check"></i>
                </div>

                <button type="submit" class="btn-auth">
                    Synchronize Vector <i class="fa-solid fa-bolt"></i>
                </button>
            </form>

            <div class="auth-footer">
                Already registered? <a href="/login">Link Signal →</a>
            </div>
        </div>
    </div>
</body>

</html>
